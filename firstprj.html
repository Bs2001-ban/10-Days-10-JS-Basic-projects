<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>


     const addAnotherDiv = ( items, color) =>{
        const div1 = document.createElement('div');
        div1.classList.add('main_div');
        div1.style.backgroundColor = `${color}`;
        div1.style.color = 'white';
        const innertxt = document.createTextNode(`${items}`);
        div1.style.display = 'flex';
        div1.style.padding = '12px'
        div1.style.border =  '10px'
        div1.style.marginBottom = '15px';
        div1.appendChild(innertxt);
        document.body.appendChild(div1);
     }

     const colorArr = ['Red', 'Green', 'Blue']
     const itemsArr = ['My name is sourav', 'See you soon', 'Who r u']

     for (let i = 0 ; i< itemsArr.length ; i++){
        addAnotherDiv(itemsArr[i] , colorArr[i]);
     }
    </script>
</body>
</html>
